version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: cpms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cpms
      POSTGRES_USER: cpms_user
      POSTGRES_PASSWORD: cpms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cpms_backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cpms
      DB_USER: cpms_user
      DB_PASSWORD: cpms_password
      PORT: 3001
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: cpms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:alpine
    container_name: cpms_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
